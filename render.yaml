services:
  - type: web
    name: shopify-mcp-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python src/shopify_mcp_server/server.py sse
    envVars:
      - key: SHOPIFY_SHOP_URL
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_PASSWORD
        sync: false
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
      - key: PORT
        value: 8000
